{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Atmosfera{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Variables ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:        #111827;
  --ink-soft:   #374151;
  --mist:       #6b7280;
  --mist-light: #9ca3af;
  --sky:        #bfdbfe;
  --sky-mid:    #93c5fd;
  --sky-deep:   #3b82f6;
  --warm:       #fef3c7;
  --gold:       #f59e0b;
  --glass:      rgba(255,255,255,0.40);
  --glass-hvy:  rgba(255,255,255,0.65);
  --glass-bdr:  rgba(255,255,255,0.70);
  --card-shadow: 0 8px 32px rgba(60,100,160,0.12), 0 2px 8px rgba(60,100,160,0.08);
  --card-inner:  inset 0 1px 0 rgba(255,255,255,0.9);
  --radius:     20px;
  --radius-sm:  12px;
}

/* ─── Body & Background ────────────────────────────────────────── */
body {
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  background: linear-gradient(160deg, #c9dff0 0%, #b2ccde 40%, #d4e8f4 100%);
  color: var(--ink);
  overflow-x: hidden;
  position: relative;
}

/* Ambient blobs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  z-index: 0;
  pointer-events: none;
}
body::before {
  width: 600px; height: 600px;
  background: rgba(147,197,253,0.35);
  top: -200px; right: -100px;
}
body::after {
  width: 500px; height: 500px;
  background: rgba(253,230,138,0.2);
  bottom: -150px; left: -100px;
}

/* ─── Layout ────────────────────────────────────────────────────── */
.page-wrap {
  position: relative;
  z-index: 1;
  max-width: 1000px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* ─── Nav ───────────────────────────────────────────────────────── */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 2.5rem;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-style: italic;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: -0.02em;
}
.logo em { color: var(--sky-deep); font-style: normal; }

.nav-hint {
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mist);
}

/* ─── Glass Card ────────────────────────────────────────────────── */
.card {
  background: var(--glass);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--glass-bdr);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow), var(--card-inner);
}

/* ─── Inputs & Buttons ──────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.75rem 1.6rem;
  border: none;
  border-radius: 50px;
  font-family: 'DM Mono', monospace;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}

.btn-primary {
  background: var(--ink);
  color: white;
  letter-spacing: 0.04em;
}
.btn-primary:hover { background: var(--ink-soft); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(17,24,39,0.25); }

.btn-ghost {
  background: var(--glass-hvy);
  color: var(--ink);
  border: 1px solid var(--glass-bdr);
}
.btn-ghost:hover { background: rgba(255,255,255,0.8); transform: translateY(-1px); }

/* ─── Animations ────────────────────────────────────────────────── */
@keyframes fadeUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
@keyframes floatY   { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }

.fade-up   { animation: fadeUp   0.6s ease both; }
.fade-down { animation: fadeDown 0.6s ease both; }

/* ─── Toast / Alert ─────────────────────────────────────────────── */
.alert {
  padding: 1rem 1.4rem;
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.alert-error { background: rgba(254,202,202,0.7); border: 1px solid rgba(252,165,165,0.8); color: #991b1b; }
.alert-info  { background: rgba(191,219,254,0.7); border: 1px solid rgba(147,197,253,0.8); color: #1e40af; }

/* ─── Footer ────────────────────────────────────────────────────── */
footer {
  text-align: center;
  padding-top: 3rem;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--mist-light);
}

/* ─── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .page-wrap { padding: 1.2rem 1rem 3rem; }
  nav { padding-bottom: 1.8rem; }
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<div class="page-wrap">
  <nav class="fade-down">
    <a href="/" class="logo">Atmos<em>fera</em></a>
    <span class="nav-hint">Live Weather</span>
  </nav>

  {% block content %}{% endblock %}

  <footer>Atmosfera &copy; 2026 &nbsp;·&nbsp; Powered by OpenWeatherMap</footer>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
